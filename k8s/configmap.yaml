# Kubernetes ConfigMap for DeepAgent
# Stores non-sensitive configuration

apiVersion: v1
kind: ConfigMap
metadata:
  name: deepagent-config
  namespace: liuyunxin
data:
  # Base configuration file
  base_config.yaml: |
    # ---------------------------- API Config ----------------------------
    
    # GAIA, HLE
    google_serper_api: "${GOOGLE_SERPER_API_KEY}"
    use_jina: True
    jina_api_key: "${JINA_API_KEY}"
    
    # ---------------------------- Model Config ----------------------------
    
    # Main Reasoning LLM
    model_name: "QwQ-32B"
    base_url: "http://sglang-main-deep-agent:8080/v1"
    api_key: "empty"
    tokenizer_path: "Qwen/QwQ-32B"
    
    # Auxiliary LLM
    aux_model_name: "Qwen2.5-32B-Instruct"
    aux_base_url: "http://sglang-aux-deep-agent.liuyunxin:8080/v1"
    aux_api_key: "empty"
    aux_tokenizer_path: "Qwen/Qwen2.5-32B-Instruct"
    
    # VQA
    vqa_model_name: "Qwen2.5-VL-32B-Instruct"
    vqa_base_url: "http://sglang-vqa-deep-agent.liuyunxin:8080/v1"
    vqa_api_key: "empty"
    
    # Tool Retriever
    tool_retriever_api_base: "http://tool-search-service:8001"
    
    # ---------------------------- Runtime Config ----------------------------
    
    # Dataset settings
    dataset_name: "gaia"
    subset_num: -1
    
    # Execution settings
    concurrent_limit: 16
    max_action_limit: 100
    max_fold_limit: 5
    top_k: 10
    
    # Generation settings
    temperature: 0.7
    top_p: 0.8
    max_tokens: 81920
    
    # ---------------------------- Data Path Config ----------------------------
    
    # GAIA
    gaia_data_path: ./data/GAIA/all.json
    gaia_file_dir: ./data/GAIA/files
    
    # HLE
    hle_data_path: ./data/HLE/all_500.json
    hle_image_dir: ./data/HLE/images
    
    # Cache
    tool_index_cache_dir: ./cache/tool_index
    search_cache_dir: ./cache/search
    url_cache_dir: ./cache/url
    
  # Environment variables
  CONFIG_PATH: "/app/config/base_config.yaml"
  OUTPUT_DIR: "/app/outputs"
  LOG_DIR: "/app/logs"

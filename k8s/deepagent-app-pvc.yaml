# Kubernetes PersistentVolumeClaim for DeepAgent App Storage
# Single PVC with subpaths for data, outputs, and logs

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: deepagent-app-pvc
  namespace: liuyunxin
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi  # Sufficient space for datasets, outputs, and logs
  storageClassName: rancher-local-path  # Use your cluster's storage class
